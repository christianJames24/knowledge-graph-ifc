<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Knowledge Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f3f6fb;
        --surface: #ffffff;
        --surface-2: #e8eef7;
        --border: rgba(15,23,42,0.12);
        --ink: #1f2937;
        --ink-muted: #64748b;
        --accent: #58a6ff;
        --accent-2: #3fb950;
        --accent-3: #d2a8ff;
        --danger: #f85149;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: grid;
        grid-template-rows: 52px 1fr;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0 1.1rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        z-index: 10;
      }
      .logo {
        font-family: "IBM Plex Mono", monospace;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        color: var(--accent);
        white-space: nowrap;
      }
      .logo span { color: var(--ink-muted); font-weight: 400; }
      .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
      #stats {
        font-size: 0.78rem;
        font-family: "IBM Plex Mono", monospace;
        color: var(--ink-muted);
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      #stats .pill { display: inline-flex; align-items: center; gap: 0.35rem; }
      #stats .pill::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }
      #stats .pill.edges::before { background: var(--accent-2); }
      #stats .pill.timing::before { background: var(--accent-3); }
      #stats .pill.cache::before { background: var(--ink-muted); }
      .spacer { flex: 1; }
      .search-wrap { position: relative; display: flex; align-items: center; }
      #search {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        padding: 0.32rem 0.7rem 0.32rem 2rem;
        width: 200px;
        outline: none;
        transition: border-color 200ms, width 200ms;
      }
      #search:focus { border-color: var(--accent); width: 260px; }
      #search::placeholder { color: var(--ink-muted); }
      .search-icon { position: absolute; left: 0.55rem; pointer-events: none; color: var(--ink-muted); font-size: 0.8rem; }
      .controls { display: flex; gap: 0.4rem; }
      .btn {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--ink-muted);
        cursor: pointer;
        font-size: 1rem;
        width: 30px; height: 30px;
        display: flex; align-items: center; justify-content: center;
        transition: color 150ms, border-color 150ms, background 150ms;
        line-height: 1;
      }
      .btn:hover { color: var(--ink); border-color: rgba(255,255,255,0.2); background: var(--surface); }
      .btn.active { color: var(--accent); border-color: var(--accent); }
      #sigma-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
      #sigma-container canvas { display: block; }
      #loading {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1rem;
        background: var(--bg);
        z-index: 5;
        transition: opacity 400ms;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .spinner {
        width: 38px; height: 38px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 700ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading-msg { font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; color: var(--ink-muted); }
      #loading-bar-wrap { width: 220px; height: 3px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
      #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 99px; transition: width 300ms ease; }
      #legend {
        position: absolute; bottom: 1rem; left: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.6rem 0.8rem;
        font-size: 0.73rem;
        z-index: 10;
        min-width: 130px;
      }
      #legend .leg-title {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        color: var(--ink-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.45rem;
      }
      .leg-item { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.3rem; color: var(--ink-muted); }
      .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
      .zoom-controls { position: absolute; bottom: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.3rem; z-index: 10; }
      .zoom-controls .btn { width: 34px; height: 34px; font-size: 1.2rem; background: var(--surface); }
      #error-msg {
        position: absolute; inset: 0;
        display: none; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 0.75rem;
        color: var(--danger);
        font-size: 0.9rem;
        font-family: "IBM Plex Mono", monospace;
      }
      #error-msg.visible { display: flex; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">IFC<span>/</span>KG</div>
      <div class="divider"></div>
      <div id="stats"><span class="pill">Loading…</span></div>
      <div class="spacer"></div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search" type="text" placeholder="Search nodes…" autocomplete="off" />
      </div>
      <div class="controls">
        <button class="btn" id="btn-labels" title="Toggle labels">𝕃</button>
        <button class="btn active" id="btn-edges" title="Toggle edges">⇌</button>
        <button class="btn" id="btn-fit" title="Fit to screen">⊡</button>
      </div>
    </header>

    <div id="sigma-container">
      <div id="loading">
        <div class="spinner"></div>
        <div id="loading-msg">Fetching graph data…</div>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      </div>
      <div id="error-msg"><span>✕</span><span id="error-text">Could not load graph data.</span></div>
      <div id="legend">
        <div class="leg-title">Node Types</div>
        <div id="legend-items"></div>
      </div>
      <div class="zoom-controls">
        <button class="btn" id="zoom-in" title="Zoom in">+</button>
        <button class="btn" id="zoom-reset" title="Reset zoom">○</button>
        <button class="btn" id="zoom-out" title="Zoom out">−</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/graphology-layout@0.6.1/dist/graphology-layout.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/dist/graphology-layout-forceatlas2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>

    <script>
    (async () => {
      const $ = id => document.getElementById(id);
      const setProgress = (pct, msg) => {
        $("loading-bar").style.width = pct + "%";
        if (msg) $("loading-msg").textContent = msg;
      };
      const showError = msg => {
        $("loading").classList.add("hidden");
        $("error-text").textContent = msg;
        $("error-msg").classList.add("visible");
      };

      const PALETTE = [
        "#58a6ff","#3fb950","#d2a8ff","#ffa657","#ff7b72",
        "#79c0ff","#56d364","#bc8cff","#f0883e","#ea6045",
        "#1f6feb","#238636","#8957e5","#9e6a03","#da3633",
      ];
      const typeColor = (() => {
        const map = {}; let i = 0;
        return type => { if (!map[type]) map[type] = PALETTE[i++ % PALETTE.length]; return map[type]; };
      })();

      setProgress(5, "Fetching graph data…");
      let raw;
      try {
        const res = await fetch("/graph-data?max_entities=450&max_nodes=1400&max_edges=2200");
        raw = await res.json();
        if (!res.ok) throw new Error(raw.detail || "HTTP " + res.status);
      } catch (err) { showError(err.message); return; }

      setProgress(30, "Building graph…");

      const graph = new graphology.Graph({ multi: false, allowSelfLoops: false });

      const randomOrganicInit = graphRef => {
        graphRef.forEachNode(node => {
          // Box-Muller transform for a soft Gaussian cloud instead of a rigid grid/ring.
          const u1 = Math.max(1e-7, Math.random());
          const u2 = Math.random();
          const r = Math.sqrt(-2 * Math.log(u1));
          const theta = 2 * Math.PI * u2;
          graphRef.setNodeAttribute(node, "x", r * Math.cos(theta));
          graphRef.setNodeAttribute(node, "y", r * Math.sin(theta));
        });
      };

      for (const n of raw.nodes) {
        const entityType = n.group ?? n.type ?? "entity";
        const color = typeColor(entityType);
        const size  = Math.max(4, Math.min(18, 4 + (n.size ?? 1) * 0.6));
        graph.addNode(String(n.id), {
          label: n.label ?? String(n.id),
          size, color, entityType,
          x: Math.random(), y: Math.random(),
        });
      }

      for (const e of raw.edges) {
        const from = String(e.from ?? e.source);
        const to   = String(e.to   ?? e.target);
        if (from === to) continue;
        if (!graph.hasNode(from) || !graph.hasNode(to)) continue;
        const eid = `${from}->${to}`;
        if (!graph.hasEdge(eid)) {
          graph.addEdgeWithKey(eid, from, to, {
            label: e.label ?? "",
            size: 1,
            color: "rgba(51,65,85,0.48)",
          });
        }
      }

      randomOrganicInit(graph);

      setProgress(55, "Running layout…");
      const fa2 = window.graphologyLayoutForceatlas2 || window.GraphologyLayoutForceatlas2;
      if (fa2 && typeof fa2.assign === "function") {
        fa2.assign(graph, {
          iterations: 380,
          settings: {
            adjustSizes: true,
            linLogMode: true,
            gravity: 0.08,
            scalingRatio: 24,
            slowDown: 2.2,
            barnesHutOptimize: true,
            barnesHutTheta: 0.7,
          },
        });
      }

      graph.forEachNode((node, attrs) => {
        const deg = graph.degree(node);
        const boosted = Math.min(22, 3.5 + Math.sqrt(deg + 1) * 1.7);
        graph.setNodeAttribute(node, "size", Math.max(attrs.size || 4, boosted));
      });

      setProgress(80, "Rendering…");

      const renderer = new Sigma(graph, $("sigma-container"), {
        renderEdgeLabels: false,
        defaultEdgeColor: "rgba(51,65,85,0.45)",
        defaultNodeColor: "#58a6ff",
        labelFont: "DM Sans",
        labelSize: 13,
        labelColor: { color: "#1f2937" },
        labelWeight: "600",
        labelThreshold: 9,
        hideEdgesOnMove: true,
        hideLabelsOnMove: true,
        renderLabels: true,
      });

      setProgress(100, "Done");
      setTimeout(() => $("loading").classList.add("hidden"), 300);

      const buildMs = raw.meta?.build_ms;
      const cached  = raw.meta?.cached;
      $("stats").innerHTML = [
        `<span class="pill">${graph.order.toLocaleString()} nodes</span>`,
        `<span class="pill edges">${graph.size.toLocaleString()} edges</span>`,
        buildMs != null ? `<span class="pill timing">${buildMs} ms</span>` : "",
        cached  != null ? `<span class="pill cache">${cached ? "cached" : "fresh"}</span>` : "",
      ].join("");

      const typeMap = {};
      const typeCounts = {};
      graph.forEachNode((_, a) => {
        typeMap[a.entityType] = a.color;
        typeCounts[a.entityType] = (typeCounts[a.entityType] || 0) + 1;
      });
      const legEl = $("legend-items");
      Object.entries(typeCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 12)
        .forEach(([type, count]) => {
          const color = typeMap[type];
          legEl.innerHTML += `<div class="leg-item"><div class="leg-dot" style="background:${color}"></div><span>${type} (${count})</span></div>`;
        });

      let hoveredNode = null;
      let selectedNode = null;
      let labelsOn = false;
      let edgesOn = true;
      let searchMatches = new Set();
      const AUTO_LABEL_MIN_SIZE = 12;

      const collectNeighborhood = node => {
        if (!node) return new Set();
        const set = new Set([node]);
        graph.forEachNeighbor(node, n => set.add(n));
        return set;
      };

      const updateReducers = () => {
        const hoverSet = collectNeighborhood(hoveredNode);
        const selectedSet = collectNeighborhood(selectedNode);
        const hasSearch = searchMatches.size > 0;
        const hasFocus = hoverSet.size > 0 || selectedSet.size > 0 || hasSearch;

        renderer.setSetting("nodeReducer", (node, data) => {
          const out = { ...data };
          const inHover = hoverSet.has(node);
          const inSelected = selectedSet.has(node);
          const inSearch = searchMatches.has(node);
          const active = !hasFocus || inHover || inSelected || inSearch;

          if (!active) {
            out.color = "rgba(125,133,144,0.18)";
            out.label = "";
            out.size = Math.max(2.8, (data.size || 4) * 0.55);
            return out;
          }

          if (!labelsOn) {
            const shouldAutoLabel = (data.size || 0) >= AUTO_LABEL_MIN_SIZE;
            if (!shouldAutoLabel && !inHover && !inSelected && !inSearch) {
              out.label = "";
            }
          }

          if (inSearch) {
            out.color = "#ffd166";
            out.size = (data.size || 4) * 1.35;
          }

          if (inSelected) {
            out.color = "#ff9f1c";
            out.size = (out.size || data.size || 4) * 1.15;
          }

          if (hoveredNode === node) {
            out.color = "#7ee787";
            out.size = (out.size || data.size || 4) * 1.18;
          }

          return out;
        });

        renderer.setSetting("edgeReducer", (edge, data) => {
          const out = { ...data };
          if (!edgesOn) {
            out.hidden = true;
            return out;
          }

          const [source, target] = graph.extremities(edge);
          const inHover = hoverSet.has(source) && hoverSet.has(target);
          const inSelected = selectedSet.has(source) && selectedSet.has(target);
          const inSearch = hasSearch && (searchMatches.has(source) || searchMatches.has(target));
          const active = !hasFocus || inHover || inSelected || inSearch;

          out.hidden = !active;
          out.color = inSelected ? "rgba(255,159,28,0.55)" : inHover ? "rgba(37,99,235,0.45)" : "rgba(51,65,85,0.48)";
          return out;
        });

        renderer.refresh();
      };

      renderer.on("enterNode", ({ node }) => {
        hoveredNode = node;
        updateReducers();
      });
      renderer.on("leaveNode", () => {
        hoveredNode = null;
        updateReducers();
      });

      renderer.on("clickNode", ({ node }) => {
        selectedNode = selectedNode === node ? null : node;
        updateReducers();
      });

      renderer.on("clickStage", () => {
        selectedNode = null;
        searchMatches = new Set();
        $("search").value = "";
        updateReducers();
      });

      $("search").addEventListener("input", e => {
        const q = e.target.value.trim().toLowerCase();
        if (!q) {
          searchMatches = new Set();
          updateReducers();
          return;
        }
        let firstMatch = null;
        const nextMatches = new Set();
        graph.forEachNode((node, attrs) => {
          const match = attrs.label.toLowerCase().includes(q);
          if (match) nextMatches.add(node);
          if (match && !firstMatch) firstMatch = node;
        });
        searchMatches = nextMatches;
        updateReducers();
        if (firstMatch) {
          const { x, y } = graph.getNodeAttributes(firstMatch);
          renderer.getCamera().animate({ x, y, ratio: 0.08 }, { duration: 500 });
        }
      });

      $("btn-labels").addEventListener("click", () => {
        labelsOn = !labelsOn;
        $("btn-labels").classList.toggle("active", labelsOn);
        updateReducers();
      });

      $("btn-edges").addEventListener("click", () => {
        edgesOn = !edgesOn;
        $("btn-edges").classList.toggle("active", edgesOn);
        updateReducers();
      });

      $("btn-fit").addEventListener("click",    () => {
        selectedNode = null;
        hoveredNode = null;
        searchMatches = new Set();
        $("search").value = "";
        renderer.getCamera().animatedReset({ duration: 400 });
        updateReducers();
      });
      $("zoom-in").addEventListener("click",    () => renderer.getCamera().animatedZoom({ duration: 300 }));
      $("zoom-out").addEventListener("click",   () => renderer.getCamera().animatedUnzoom({ duration: 300 }));
      $("zoom-reset").addEventListener("click", () => renderer.getCamera().animatedReset({ duration: 400 }));

      updateReducers();
    })();
    </script>
  </body>
</html>
